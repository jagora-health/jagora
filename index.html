<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Jagora</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="welcome">
        <h1>Jagora</h1>
        <p>The counselling companion</p>
        <button onclick="startVisit()">Start a visit</button>
        </div>
        <div id="visit" class="hidden">
            <h1>New visit</h1>
            <p>Enter the household details.</p>
            <input id="name" placeholder="Name e.g ADAHAS" maxlength="6" oninput="updatePreview()">
            <input id="settlement" placeholder="Settlement" maxlength="3" oninput="updatePreview()">
            <input type="text" id="number" placeholder="No." maxlength="3" inputmode="numeric" oninput="updatePreview()">
            <p id="preview"></p>
            <button onclick="goToConfirm()">Continue</button>
        
        </div>
        <div id="confirm" class="hidden">
            <h1>Household</h1>
            <p id="shownId"></p>
        </div>
        <script>
            function startVisit() {
                document.getElementById('welcome').classList.add('hidden');
                document.getElementById('visit').classList.remove('hidden');
            }
            function updatePreview() {
                var ward = 'DUL';
                var name = document.getElementById('name').value.toUpperCase();
                var settlement = document.getElementById('settlement').value.toUpperCase();
                var number = document.getElementById('number').value;

                document.getElementById('preview').textContent = name + '-' + settlement + '-' + ward + '-' +number;



            }
            function goToConfirm() {
                var id = document.getElementById('preview').textContent;
                document.getElementById('shownId').textContent = 'Household ID: ' + id;
                document.getElementById('visit').classList.add('hidden');
                document.getElementById('confirm').classList.remove('hidden');
            }
        </script>
    </body>
</html>
