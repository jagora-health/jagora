<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Jagora</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="welcome">
        <h1>Jagora</h1>
        <p>The counselling companion</p>
        <button onclick="startVisit()">Start a visit</button>
        </div>
        <div id="visit" class="hidden">
            <h1>New visit</h1>
            <p>Enter the household ID from the wall or flier.</p>
        </div>
        <script>
            function startVisit() {
                document.getElementById('welcome').classList.add('hidden');
                document.getElementById('visit').classList.remove('hidden');
            }
        </script>
    </body>
</html>
