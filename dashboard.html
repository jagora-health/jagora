<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jagora — Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
    <header class="topbar">
        <span class="logo">Jagora</span>
        <span class="subtitle">Programme Dashboard — Bauchi</span>
        <span id="roleLabel" class="role"></span>
    </header>

    <section class="callout" id="referralCallout"></section>
    <section class="filterBar">
        <span class="filterLabel">Period:</span>
        <button onclick="applyFilter('all')">All time</button>
        <button onclick="applyFilter('2026-01')">January</button>
        <button onclick="applyFilter('2026-02')">February</button>
        <button onclick="applyFilter('2026-03')">March</button>
        <span class="filterLabel">Custom:</span>
        <input type="date" id="fromDate">
        <span>to</span>
        <input type="date" id="toDate">
        <button onclick="applyCustomFilter()">Apply</button>
        <span id="filterStatus" class="filterStatus"></span>
    </section>

    <section class="statRow" id="statRow"></section>
    <section class="chartRow">
        <div class="chartCard">
            <h3>Counselling coverage by ward</h3>
            <canvas id="coverageChart"></canvas>
        </div>
        <div class="chartCard">
            <h3>Referral funnel</h3>
            <canvas id="funnelChart"></canvas>
        </div>
    </section>
    <section class="mapSection">
        <div class="chartCard">
            <h3>Visit locations — GPS verified</h3>
            <div id="map"></div>
        </div>
    </section>
    <section class="tableSection">
        <div class="chartCard">
            <h3>CBD activity — tap a worker to view detail</h3>
            <div class="tableControls">
                <label>Ward: <select id="wardSelect" onchange="setWardFilter()"></select></label>
            </div>
            <div id="cbdTable"></div>
        </div>
    </section>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="seed.js"></script>
    <script src="dashboard.js"></script>
    <div id="cbdDetail" class="overlay hidden">
        <div class="overlayCard">
            <button class="closeBtn" onclick="closeCbdDetail()">✕</button>
            <div id="cbdDetailContent"></div>
        </div>
    </div>
</body>
</html>
